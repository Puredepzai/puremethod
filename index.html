<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureMethod</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>
    if (!window.crossOriginIsolated) window.SharedArrayBuffer = undefined;
  </script>
  <script src="coi-serviceworker.js"></script>
  <script type="importmap">
    {
      "imports": {
        "lucide": "https://esm.sh/lucide@0.475.0",
        "@ffmpeg/util": "https://esm.sh/@ffmpeg/util@0.12.2",
        "@ffmpeg/ffmpeg": "https://esm.sh/@ffmpeg/ffmpeg@0.12.15"
      }
    }
  </script>
</head>
<body>
  <script>
    if (localStorage.getItem('puremethod_key') !== 'abc123') {
      window.location.href = 'lock.html';
    }
  </script>

  <div class="app">
    <header>
      <div class="logo">Pure<span>Method</span></div>
      <div class="sub">Bypass TikTok compression · Preserve original quality</div>
    </header>

    <main>
      <section class="settings">
        <div class="section-title">Settings</div>
        <label>
          <input type="checkbox" id="enableInterpolation" />
          <span>60fps Interpolation</span>
          <small>Inflates frame count to 60fps</small>
        </label>
        <label>
          <input type="checkbox" id="enableHDR" />
          <span>HDR10 Conversion</span>
          <small>SDR → HDR10 (PQ, BT.2020)</small>
        </label>
        <div class="resolution" id="vfiResolutionBox" style="display:none;">
          <span>Output Resolution</span>
          <select id="outputResolution">
            <option value="1080">1080p</option>
            <option value="1440">2K (1440p)</option>
          </select>
        </div>
        <div class="note">⚡ Processing speed depends on your device.</div>
      </section>

      <section class="drop">
        <div class="drop-zone" id="dropZone">
          <div class="icon">⤵</div>
          <div class="text">
            <strong>Drop videos here</strong>
            <span>or click to select · MP4 / MOV</span>
          </div>
        </div>
        <div class="queue" id="fileList"></div>
      </section>

      <section class="actions">
        <button class="btn primary" id="patchBtn" disabled>Patch Videos</button>
        <button class="btn secondary" id="clearBtn">Clear</button>
        <a class="btn tiktok" href="https://www.tiktok.com/tiktokstudio/upload" target="_blank">Upload to TikTok Studio</a>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
        <div class="note">Upload patched video via TikTok Studio web to ensure bypass works.</div>
      </section>
    </main>

    <footer>
      <div class="log-title">System Log</div>
      <div class="log-body" id="statusLog"></div>
    </footer>

    <div class="footer-link">
      <a href="https://www.tiktok.com/@pure.xyz" target="_blank">TikTok</a>
    </div>
  </div>

  <input type="file" id="fileInput" accept="video/mp4,video/quicktime,.mp4,.mov" multiple />
  <script type="module" src="app.js"></script>
</body>
</html>
