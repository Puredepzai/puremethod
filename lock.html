<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureMethod — Access Key</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
      padding: 20px;
    }

    .lock-card {
      background: #111111;
      border: 2px solid #333333;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .lock-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .lock-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: #ffffff;
    }
    .lock-title span {
      color: #aaaaaa;
    }

    .lock-sub {
      font-size: 14px;
      color: #888888;
      margin-bottom: 32px;
      font-weight: 400;
    }

    .lock-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #333333;
      border-radius: 10px;
      background: #0a0a0a;
      color: #ffffff;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease;
      box-sizing: border-box;
    }
    .lock-input:focus {
      border-color: #ffffff;
    }
    .lock-input::placeholder {
      color: #555555;
    }

    .lock-btn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      background: #ffffff;
      color: #000000;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .lock-btn:hover {
      background: #000000;
      color: #ffffff;
      border-color: #ffffff;
    }
    .lock-btn:active {
      transform: scale(0.97);
    }

    .lock-error {
      color: #ff5555;
      font-size: 13px;
      margin-top: 14px;
      min-height: 20px;
      font-weight: 500;
    }

    .lock-footer {
      margin-top: 32px;
      font-size: 12px;
      color: #444444;
      border-top: 1px solid #222222;
      padding-top: 20px;
    }
    .lock-footer a {
      color: #666666;
      text-decoration: none;
      transition: color 0.2s;
    }
    .lock-footer a:hover {
      color: #ffffff;
    }

    @media (max-width: 480px) {
      .lock-card {
        padding: 32px 20px;
      }
      .lock-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="lock-card">
    <span class="lock-icon">🔐</span>
    <h1 class="lock-title">Pure<span>Method</span></h1>
    <p class="lock-sub">Enter your access key</p>

    <input class="lock-input" id="keyInput" type="password" placeholder="Enter key..." autofocus />
    <button class="lock-btn" id="unlockBtn">Unlock</button>
    <div class="lock-error" id="lockError"></div>

    <div class="lock-footer">
      <a href="https://www.tiktok.com/@pure.xyz" target="_blank" rel="noopener noreferrer">Follow us on TikTok</a>
    </div>
  </div>

  <script>
    const VALID_KEY = "abc123";

    function getDeviceFingerprint() {
      const c = [
        navigator.userAgent,
        screen.width,
        screen.height,
        navigator.platform,
        navigator.language,
        new Date().getTimezoneOffset()
      ];
      return btoa(encodeURIComponent(c.join('|||')));
    }

    const deviceId = getDeviceFingerprint();
    const savedKey = localStorage.getItem('puremethod_key');
    const savedDevice = localStorage.getItem('puremethod_device');
    const isActivated = localStorage.getItem('puremethod_activated') === 'true';

    if (isActivated && savedKey === VALID_KEY && savedDevice === deviceId) {
      window.location.href = 'index.html';
    }

    const input = document.getElementById('keyInput');
    const btn = document.getElementById('unlockBtn');
    const error = document.getElementById('lockError');

    function tryUnlock() {
      const key = input.value.trim();
      if (key !== VALID_KEY) {
        error.textContent = '❌ Invalid key.';
        input.value = '';
        input.focus();
        return;
      }
      if (isActivated) {
        error.textContent = '❌ This key has already been used.';
        input.value = '';
        input.focus();
        return;
      }
      localStorage.setItem('puremethod_key', key);
      localStorage.setItem('puremethod_device', deviceId);
      localStorage.setItem('puremethod_activated', 'true');
      window.location.href = 'index.html';
    }

    btn.addEventListener('click', tryUnlock);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryUnlock();
    });

    input.focus();
  </script>
</body>
</html>
